<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App Using OOP</title>
    <link rel="stylesheet" href="./style.css">
    <!-- <link rel="stylesheet" href="./font-awesome-4.7.0/css/font-awesome.css"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>
    <section class="app">
        <header>
            <h3 align="center">Todo App</h3>
            <form id="get_input">
                <input type="text" placeholder="Enter your todo here" id="userInput" autofocus>
                <button id="addBtn"><i class="fa fa-plus"></i></button>
                <button class="editBtn hidden">Edit</button>
            </form>
        </header>
        <!-- Rendering todos here  -->
        <div class="todo-list"></div>
    </section>

    <script src="./Js/modules/getInput.js"></script>
    <script src="./Js/modules/displayFunc.js"></script>
    <script src="./Js/modules/helperFunctions.js"></script>
    <script src="./Js/index.js"></script>
</body>
</html>
